<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transparent Coin Flip</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="utility-bar">
      <button id="details-button" class="mini-button mini-button-secondary" type="button">
        Details
      </button>
      <button id="reset-app-button" class="mini-button mini-button-secondary" type="button">
        Reset App
      </button>
    </div>

    <main class="shell">
      <section class="app">
        <section class="presence-strip" aria-label="People here now">
          <div class="presence-summary">
            <span id="presence-count" class="presence-count">No one here</span>
            <div id="presence-list" class="presence-list"></div>
          </div>
          <label class="presence-name">
            <span class="presence-label">You</span>
            <input
              id="presence-name-input"
              class="presence-name-input"
              type="text"
              maxlength="40"
              placeholder="optional name"
            />
          </label>
        </section>

        <section class="stage-row">
          <button id="flip-button" class="coin-button" type="button" aria-label="Flip the coin">
            <div id="coin" class="coin resting" aria-live="polite">
              <div class="coin-face coin-front"></div>
              <div class="coin-face coin-back"></div>
            </div>
          </button>

          <div class="best-of-inline" aria-label="Best of options">
            <span class="best-of-label">BEST OF</span>
            <input
              id="best-of-input"
              class="best-of-input"
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              autocomplete="off"
            />
            <span id="best-of-summary" class="best-of-summary"></span>
          </div>
        </section>

        <p id="status-text" class="status-text">Click the coin to flip</p>
        <p id="result-text" class="result-text"></p>

        <section id="session-panel" class="session-panel is-hidden" aria-label="Current session">
          <div class="session-header">
            <p class="session-title">Session</p>
            <p id="session-score" class="session-score"></p>
          </div>
          <p id="session-status" class="session-status"></p>
          <div id="session-results" class="session-results"></div>
        </section>

        <section class="outcomes" aria-label="Coin outcomes">
          <article id="heads-outcome" class="outcome-card">
            <p class="outcome-label">Heads</p>
            <textarea id="heads-input" rows="3" placeholder="What happens if heads wins?"></textarea>
          </article>
          <article id="tails-outcome" class="outcome-card">
            <p class="outcome-label">Tails</p>
            <textarea id="tails-input" rows="3" placeholder="What happens if tails wins?"></textarea>
          </article>
        </section>

        <section id="details-panel" class="details is-hidden">
          <article class="detail-row">
            <p class="detail-label">Verification</p>
            <p id="verification-text" class="detail-value">Waiting for reveal</p>
          </article>
          <article class="detail-row">
            <p class="detail-label">Commitment hash</p>
            <code id="commitment-text">Not started</code>
          </article>
          <article class="detail-row">
            <p class="detail-label">Secret after reveal</p>
            <code id="secret-text">Hidden until the flip completes</code>
          </article>
        </section>

        <section class="history" aria-label="Flip history">
          <div class="history-header">
            <p class="history-title">History</p>
            <div class="history-actions">
              <button id="clear-history-button" class="mini-button mini-button-secondary" type="button">
                Clear History
              </button>
            </div>
          </div>
          <div id="history-list" class="history-list">
            <p class="history-empty">No flips yet.</p>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
